<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dra Paocas | Medicina y Cirugía Veterinaria</title>

<!-- CAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  color:#333;
}

/* HERO */
.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
  background:linear-gradient(135deg,#6f42c1,#9c7be6);
  color:white;
}

.hero-left{
  flex:1;
  min-width:300px;
  text-align:center;
}

.hero-left img{
  width:100%;
  max-width:420px;
  border-radius:20px;
}

.hero-right{
  flex:1;
  min-width:300px;
  max-width:500px;
  padding:20px;
}

/* LOGO */
.logo-box img{
  width:260px;
  filter: drop-shadow(0px 10px 25px rgba(0,0,0,0.45));
  margin-bottom:20px;
}

/* TEXTOS */
.hero-right h1{
  font-size:42px;
}

.hero-right h2{
  font-size:20px;
  font-weight:400;
}

.sub{
  font-size:16px;
  margin-bottom:25px;
}

/* BOTON */
.btn{
  display:inline-block;
  background:#25D366;
  color:white;
  padding:14px 26px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

/* SECCIONES */
.section{
  padding:60px 20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

.gray{
  background:#f5f5f5;
}

/* SERVICIOS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* REDES */
.social{
  text-align:center;
}

.social img{
  width:40px;
}

/* CAPTCHA */
.captcha-box{
  margin:20px 0;
}

/* WHATSAPP FLOAT */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:16px;
  border-radius:50%;
  text-decoration:none;
  font-size:20px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <div class="hero-left">
    <img src="portada-fb2.png">
  </div>

  <div class="hero-right">

    <div class="logo-box">
      <img src="LOGO CLIENTES.png">
    </div>

    <h1>Dra Paocas</h1>

    <h2>Medicina y cirugía veterinaria</h2>

    <p class="sub">
      Atención a domicilio · Asesoría en línea · Cirugía de tejidos blandos.<br>
      <strong>Soacha y sur de Bogotá</strong>
    </p>

    <p style="font-size:14px;">Verificación de seguridad</p>

    <div class="captcha-box">
      <div class="g-recaptcha" data-sitekey="6LfhE64sAAAAAHq-OfP_AcecGZZdK5r6Ms5CaPnD"></div>
    </div>

    <button class="btn" onclick="irWhatsApp()">
      Agendar por WhatsApp
    </button>

  </div>

</section>

<!-- SERVICIOS -->
<section class="section gray">
  <div class="container">
    <h2>Servicios</h2>

    <div class="grid">

      <div class="card">
        <img src="cirugia.jpeg">
        <p>Cirugía de tejidos blandos</p>
      </div>

      <div class="card">
        <img src="consulta.jpeg">
        <p>Consulta a domicilio</p>
      </div>

      <div class="card">
        <img src="procedimiento.jpeg">
        <p>Postoperatorio</p>
      </div>

      <div class="card">
        <img src="profesional.jpeg">
        <p>Atención clínica</p>
      </div>

      <div class="card">
        <img src="portada.jpeg">
        <p>Enfoque integral</p>
      </div>

    </div>
  </div>
</section>

<!-- REDES -->
<section class="section">
  <div class="container">

    <h2>Redes sociales</h2>

    <div class="social">
      <a href="https://www.instagram.com/drapaocas" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
      </a>
      <a href="https://www.facebook.com/drapaocas" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
      </a>
      <a href="https://www.tiktok.com/@drapaocas" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
      </a>
      <a href="https://www.youtube.com/@drapaocas" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
      </a>
    </div>

  </div>
</section>

<!-- SCRIPT ANTI-SPAM -->
<script>

function irWhatsApp(){

  var captcha = document.querySelector('.g-recaptcha-response');

  if(!captcha || captcha.value === ""){
    alert("Verifica que eres humano");
    return;
  }

  // número oculto (no visible para bots)
  var num = "573195287810";

  var url = "https://wa.me/" + num + "?text=Hola,%20quiero%20agendar%20una%20consulta";

  window.open(url, "_blank");
}

</script>

<!-- BOTON FLOTANTE (SIN EXPONER NUMERO DIRECTO) -->
<a href="#" class="whatsapp" onclick="irWhatsApp()">💬</a>

</body>
</html>
